<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인 — Hotel Admin</title>

    <!-- Spring Security CSRF (fetch 사용 시 헤더로 전달) -->
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- 로그인 전용 CSS -->
    <link rel="stylesheet" th:href="@{/css/admin/login.css}">

    <!-- axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     상단 헤더 바
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<div class="top-bar">
    <div class="top-bar-title" id="pageTitle">관리자 로그인</div>
</div>

<div class="page-body">
    <div class="card">

        <!-- ════════════════════════════
             VIEW A : 로그인 폼
        ════════════════════════════ -->
        <div class="view active" id="viewLogin">
            <div class="card-inner">

                <!-- 브랜드 -->
                <div class="brand">
                    <div class="brand-name">HOTEL ADMIN</div>
                    <div class="brand-sub">키오스크 관리자 시스템</div>
                </div>

                <div class="test-account-guide">
                    <p class="guide-label">[ 프로젝트 검토용 테스트 계정 ]</p>
                    <p class="guide-info">
                        ID : <strong>admin</strong> /
                        PW : <strong>1234</strong>
                    </p>
                </div>

                <form th:action="@{/admin/login}" method="post"
                      id="loginForm" novalidate>

                    <!-- CSRF 토큰 (Spring Security 필수) -->
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">

                    <!-- ① 로그인 실패 에러 박스 -->
                    <!--   Controller 에서 model.addAttribute("errorMsg", ...) 로 직접 전달하거나
                           Spring Security 기본 예외 메시지를 사용 -->
                    <div class="error-box" th:if="${errorMsg}">
                        <span th:text="${errorMsg}">아이디 또는 비밀번호를 확인해주세요.</span>
                    </div>

                    <!-- ② 관리자 ID -->
                    <div class="field">
                        <label class="field-label" for="username">관리자 ID</label>
                        <input class="inp-solo"
                               type="text"
                               id="username"
                               name="username"
                               placeholder="superadmin1 / admin1"
                               th:classappend="${errorMsg != null} ? 'is-error'"
                               autocomplete="username"
                               autofocus>
                    </div>

                    <!-- ③ 비밀번호 -->
                    <div class="field">
                        <label class="field-label" for="password">비밀번호</label>
                        <input class="inp-solo"
                               type="password"
                               id="password"
                               name="password"
                               placeholder="••••••••"
                               th:classappend="${errorMsg != null} ? 'is-error'"
                               autocomplete="current-password">
                    </div>

                    <!-- ④ 5회 실패 경고 문구 (항상 표시) -->
                    <p class="warn-text">로그인 5 회 실패 시 계정이 잠깁니다</p>

                    <!-- ⑤ 로그인 버튼 -->
                    <button type="button" class="btn-submit" id="btnLogin">로그인</button>
                </form>
            </div><!-- /card-inner -->

            <div class="card-footer">
                <hr class="footer-hr">
                <!-- 최고 관리자 연락처 (Controller 에서 superAdminPhone 전달) -->
                <p class="footer-contact">
                    최고 관리자 연락처 ：
                    <span th:text="${superAdminPhone != null} ? ${superAdminPhone} : '010-****-****'">
              010-****-****
            </span>
                </p>
                <hr class="footer-hr">
                <!-- 이메일 인증 화면으로 전환 -->
            </div>
        </div><!-- /viewLogin -->


        <!-- ════════════════════════════
             VIEW B : 이메일 인증 폼
        ════════════════════════════ -->
        <div class="view" id="viewVerify">
            <div class="card-inner">

                <!-- 브랜드 -->
                <div class="brand">
                    <div class="brand-name">HOTEL ADMIN</div>
                    <div class="brand-sub">키오스크 관리자 시스템</div>
                </div>

                <!-- ① 이메일 + 인증번호 발송 버튼 (인풋 내장) -->
                <div class="field">
                    <label class="field-label">관리자 Email</label>
                    <div class="input-wrap" id="emailWrap">
                        <input type="email"
                               id="verifyEmail"
                               placeholder="superadmin1@hotel.com"
                               autocomplete="email">
                        <button type="button"
                                class="input-inner-btn">인증번호<br>발송
                        </button>
                    </div>
                </div>

                <!-- ② 인증번호 + 타이머 (인풋 내장) -->
                <div class="field">
                    <label class="field-label">인증번호</label>
                    <div class="input-wrap">
                        <input type="text"
                               id="verifyCode"
                               placeholder="• • • • • • •"
                               maxlength="7"
                               autocomplete="one-time-code">
                        <div class="input-timer" id="verifyTimer">남은 시간 05:00</div>
                    </div>
                </div>

                <!-- ③ 인증 완료 버튼 -->
                <button type="button" class="btn-submit">
                    인증 완료
                </button>

            </div><!-- /card-inner -->

            <div class="card-footer">
                <hr class="footer-hr">
                <div class="footer-link-wrap">
                    <button class="footer-link">
                        ← 로그인으로 돌아가기
                    </button>
                </div>
            </div>
        </div><!-- /viewVerify -->

    </div><!-- /card -->
</div><!-- /page-body -->


<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     모달 : 로그인 5회 실패
     Controller 에서 failCount >= 5 이면
     model.addAttribute("locked", true) 전달
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<div class="overlay" id="modalLocked"
     th:classappend="${locked} ? 'open'">
    <div class="modal-card">
        <div class="modal-fail-title">로그인 5 회 실패</div>
        <div class="modal-fail-sub">* 최고관리자에게 문의해주세요</div>
        <button class="btn-modal-ok">확인
        </button>
    </div>
</div>

<div class="overlay" id="modal-alert">
    <div class="modal-card">
        <div class="modal-fail-title" id="modal-alert-msg" style="margin-bottom:20px;"></div>
        <button type="button" class="btn-modal-ok" id="modal-alert-confirm">확인</button>
    </div>
</div>

<!-- 1. 공통 유틸리티 -->
<script src="/js/admin/main.js"></script>

<!-- 2. 서버 데이터 전달 (인라인 스크립트) -->
<script th:inline="javascript">
    window._failCount = [[${failCount != null ? failCount : 0
    }]]
</script>

<!-- 3. 로그인 전용 모듈 -->
<script src="/js/admin/login.js"></script>
</body>
</html>
